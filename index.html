<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Arranjo de Figuras</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #f7f6f3, #eae7e2);
      color: #1a1a1a;
    }

    .table {
      position: absolute;
      width: 100%;
      height: 100%;
      perspective: 1200px;
    }

    .card {
      position: absolute;
      width: 120px;
      height: 160px;
      border-radius: 14px;

      /* VARIAÇÕES DE COR */
      background: var(--bg);

      box-shadow: 0 12px 30px rgba(0,0,0,0.15);
      opacity: 0;

      animation: deal 1s ease forwards, shuffle 6s ease-in-out infinite;
    }

    /* Paleta mais viva (controlada) */
    .tone1 { --bg: linear-gradient(145deg, #ffffff, #e3e0db); }
    .tone2 { --bg: linear-gradient(145deg, #e8eef5, #cfd8e3); } /* azul suave */
    .tone3 { --bg: linear-gradient(145deg, #e6f0ec, #c8dcd2); } /* verde suave */
    .tone4 { --bg: linear-gradient(145deg, #f2e9e4, #e0cfc6); } /* terracota */
    .tone5 { --bg: linear-gradient(145deg, #f0f0f0, #d6d6d6); }

    @keyframes deal {
      0% {
        transform: translate(-50%, -50%) scale(0.3);
        opacity: 0;
      }
      60% {
        transform: translate(var(--x), var(--y)) scale(1.05) rotate(var(--r));
        opacity: 1;
      }
      100% {
        transform: translate(var(--x), var(--y)) scale(1) rotate(var(--r));
        opacity: 1;
      }
    }

    @keyframes shuffle {
      0%,100% {
        transform: translate(var(--x), var(--y)) rotate(var(--r));
      }
      50% {
        transform: translate(calc(var(--x) + 25px), calc(var(--y) - 20px)) rotate(calc(var(--r) + 6deg));
      }
    }

    .center {
      position: relative;
      z-index: 10;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      opacity: 0;
      animation: fadeIn 1.2s ease forwards;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    h1 {
      font-size: 2.6rem;
      font-weight: 500;
      margin-bottom: 40px;
      letter-spacing: 1px;
      color: #222;
    }

    .btn {
      padding: 14px 42px;
      border-radius: 999px;
      border: 1px solid #222;
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(6px);
      color: #222;
      text-decoration: none;
      transition: 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: "";
      position: absolute;
      inset: 0;
      background: #222;
      transform: scaleX(0);
      transform-origin: left;
      transition: 0.3s ease;
      z-index: -1;
    }

    .btn:hover::after {
      transform: scaleX(1);
    }

    .btn:hover {
      color: #fff;
      transform: translateY(-2px);
    }

  </style>
</head>

<body>

  <div class="table" id="table"></div>

  <div class="center">
    <h1>Arranjo de Figuras</h1>
    <a href="page1.html" class="btn">Começar</a>
  </div>

  <script>
    const table = document.getElementById("table");
    const tones = ["tone1", "tone2", "tone3", "tone4", "tone5"];

    function createCard(i) {
      const card = document.createElement("div");
      card.classList.add("card");

      // adiciona cor variada
      card.classList.add(tones[Math.floor(Math.random() * tones.length)]);

      const x = Math.random() * window.innerWidth;
      const y = Math.random() * window.innerHeight;
      const r = (Math.random() * 40 - 20) + "deg";

      card.style.setProperty("--x", x + "px");
      card.style.setProperty("--y", y + "px");
      card.style.setProperty("--r", r);

      card.style.animationDelay = (i * 0.1) + "s, 2s";

      table.appendChild(card);
    }

    for (let i = 0; i < 16; i++) {
      createCard(i);
    }
  </script>

</body>
</html>
